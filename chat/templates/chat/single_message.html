{% load chat_extras %}

<div class="flex flex-col
    {% if message.user == user %}items-end
    {% else %}items-start
    {% endif %}group animate-in fade-in slide-in-from-bottom-2 duration-300">

    <div class="max-w-[80%] relative">

        {% if message.user != user %}
        <div class="flex items-center mb-1">
            <div class="shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-[10px]
                        font-bold text-white shadow-sm
                        {% if message.user == user %}
                            bg-linear-to-tr from-blue-600 to-blue-400
                        {% else %}
                            bg-linear-to-tr from-gray-500 to-gray-400
                        {% endif %}">
                {{ message.user.username|slice:":2"|upper }}
            </div>

            <span class="text-[11px] font-semibold text-gray-600 ml-2 mb-1 block uppercase tracking-wider">
                {{ message.user.username }}
            </span>
        </div>
        {% endif %}

        <!-- Message bubble -->
        <div class="px-4 py-2.5 rounded-2xl shadow-sm text-sm sm:text-base transition-all ring-1
            {% if message.user == user %}
                bg-blue-600 text-white rounded-br-none font-medium ring-blue-700/50
            {% else %}
                bg-white border border-gray-200 text-gray-800 rounded-bl-none ring-black/5
            {% endif %}">

            <p class="leading-relaxed wrap-break-word">{{ message.content }}</p>

            <div class="flex items-center gap-1 mt-1
                {% if message.user == user %}justify-end{% endif %}">

                <span class="text-[10px] font-medium italic
                    {% if message.user == user %}
                        text-blue-100
                    {% else %}
                        text-gray-400
                    {% endif %}">
                    {{ message.user.username }}: {{ message.timestamp|timesince|split:","|first }} temu
                </span>

                {% if message.user == user %}
                <svg xmlns="http://www.w3.org/2000/svg"
                     class="w-3 h-3 text-blue-200"
                     viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="3"
                     stroke-linecap="round"
                     stroke-linejoin="round">
                    <path d="M20 6 9 17l-5-5" />
                </svg>
                {% endif %}
            </div>
        </div>
    </div>
</div>
