{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl border border-gray-100
     dark:bg-gray-900 dark:border-gray-800 transition-colors duration-200">

        <div class="flex justify-center mb-6">
            <div class="w-16 h-16 rounded-2xl bg-linear-to-tr from-blue-600 to-blue-400
                flex items-center justify-center shadow-lg rotate-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
        </div>

        <h2 class="text-2xl font-bold text-gray-900 text-center mb-2 dark:text-gray-100">Witaj ponownie</h2>
        <p class="text-gray-500 text-center mb-8 text-sm dark:text-gray-100">Zaloguj się, aby kontynuować rozmowę</p>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            {% if form.non_field_errors %}
                <div class="p-3 rounded-lg bg-red-50 border border-red-100 text-red-600 text-sm">
                    {% for error in form.non_field_errors %}
                        {{ error }}
                    {% endfor %}
                </div>
            {% endif %}

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">Użytkownik</label>
                <input type="text" name="username" autofocus required
                       class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-gray-800"
                       placeholder="Twój login">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2 ml-1">Hasło</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-gray-800"
                       placeholder="••••••••">
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all transform active:scale-[0.98] shadow-lg shadow-blue-100 mt-2">
                Zaloguj się
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-sm text-gray-500 dark:text-gray-400">
                Nie masz jeszcze konta?
                <a href="{% url 'signup' %}" class="text-blue-600 hover:text-blue-700 font-bold ml-1">Zarejestruj się</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
