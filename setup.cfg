[flake8]
max-line-length = 100
ignore =
    E203,
    W503,
    E501,
    F403,
    F405,
    F401
exclude =
    .git,
    __pycache__,
    migrations,
    settings.py,
    manage.py,
    env,
    venv
max-complexity = 10

[isort]
profile = black
line_length = 100
skip = migrations,env,venv

[tool.black]
line-length = 100
target-version = ['py39']
skip-string-normalization = true
