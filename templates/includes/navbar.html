<nav class="bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-700 py-4 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">

        <!-- Logo -->
        <a href="{% url 'index' %}"
           class="text-2xl font-bold bg-linear-to-r from-blue-600 to-indigo-500 bg-clip-text text-transparent">
            SkyChat
        </a>

        <div class="flex items-center gap-4">

            {% if user.is_authenticated %}
                <span class="text-sm text-gray-600 dark:text-gray-300">
                    Witaj,
                    <strong class="text-gray-900 dark:text-gray-100">{{ user.username }}</strong>
                    <span class="status-dot ml-1" data-user="{{ user.username }}"></span>
                </span>

                <a href="{% url 'chat:chat_room' %}"
                   class="text-sm font-medium text-gray-600 dark:text-gray-300
                          hover:text-blue-600 dark:hover:text-blue-400 transition">
                    Czat
                </a>

                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit"

                            class="text-sm font-medium text-red-500 dark:text-red-400
                                   hover:text-red-700 dark:hover:text-red-300 transition">
                        Wyloguj
                    </button>
                </form>

            {% else %}
                <a href="{% url 'login' %}"
                   class="text-sm font-medium text-gray-600 dark:text-gray-300
                          hover:text-blue-600 dark:hover:text-blue-400 transition">
                    Logowanie
                </a>

                <a href="{% url 'signup' %}"
                   class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold
                          hover:bg-blue-700 transition-all">
                    Dołącz
                </a>
            {% endif %}

            <a href="{% url 'chat:online' %}" class=" hover:text-blue-600 dark:hover:text-blue-400 transition-colors ">
            Kto jest online</a>


            <!-- 🌗 Przełącznik motywu -->
            <button id="theme-toggle"
                    class="w-9 h-9 flex items-center justify-center rounded-lg
                           border border-gray-300 dark:border-gray-600
                           bg-gray-100 dark:bg-gray-800
                           text-gray-700 dark:text-gray-200
                           hover:bg-gray-200 dark:hover:bg-gray-700
                           transition">

                <!-- ☀️ Ikona słońca -->
                <svg id="icon-sun" class="w-5 h-5 block dark:hidden"
                     fill="none" stroke="currentColor" stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41
                             M17.66 17.66l1.41 1.41
                             M2 12h2M20 12h2
                             M4.93 19.07l1.41-1.41
                             M17.66 6.34l1.41-1.41"></path>
                </svg>

                <!-- 🌙 Ikona księżyca -->
                <svg id="icon-moon" class="w-5 h-5 hidden dark:block"
                     fill="none" stroke="currentColor" stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3
                             7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>

        </div>
    </div>
</nav>
